# Configuration for cargo-deny
[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = [
    # rustls-webpki CRL Distribution Point bypass - fix (>= 0.103.10) not yet published to crates.io
    # TODO: remove once rustls-webpki 0.103.10+ is available and resolved via jsonrpsee
    "RUSTSEC-2026-0049",
    # lru IterMut unsoundness - transitive via reth's discv5, not directly fixable
    # TODO: remove once reth upgrades discv5 with a patched lru
    "RUSTSEC-2026-0002",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"