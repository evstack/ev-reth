# EV Deployer configuration (genesis mode)
# See: bin/ev-deployer/README.md

[chain]
# The chain ID for the target network.
chain_id = 0

# ── Contracts ────────────────────────────────────────────
# Uncomment and configure the contracts you want in genesis.
# The `address` field is required for genesis mode.

# AdminProxy: transparent proxy with owner-based access control.
# The owner address is stored in slot 0.
# [contracts.admin_proxy]
# address = "0x000000000000000000000000000000000000Ad00"
# owner = "0x..."

# Permit2: Uniswap canonical token approval manager.
# [contracts.permit2]
# address = "0x000000000022D473030F116dDEE9F6B43aC78BA3"

# Deterministic deployer (Nick's factory): CREATE2 factory for deploy mode.
# Required in genesis for post-merge chains where the keyless tx cannot land.
# [contracts.deterministic_deployer]
# address = "0x4e59b44847b379578588920cA78FbF26c0B4956C"
