name: EV Deployer CI

on:
  push:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ev_deployer.yml'
      - 'contracts/src/**'
      - 'contracts/foundry.toml'
      - 'bin/ev-deployer/**'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ev_deployer.yml'
      - 'contracts/src/**'
      - 'contracts/foundry.toml'
      - 'bin/ev-deployer/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-bytecodes:
    name: EV Deployer bytecode verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Hyperlane soldeer dependencies
        run: cd contracts/lib/hyperlane-monorepo/solidity && forge soldeer install

      - name: Run bytecode verification tests
        run: cargo test -p ev-deployer -- --ignored --test-threads=1

  unit-tests:
    name: EV Deployer unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run unit tests
        run: cargo test -p ev-deployer

  e2e-genesis:
    name: EV Deployer e2e genesis test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run e2e genesis test
        run: bash bin/ev-deployer/tests/e2e_genesis.sh
